$schema: https://json-schema.org/draft/2020-12/schema
title: TransformJob
description: >
  A scheduled job that executes transforms matching specific tags.
  Stored in transforms/transform_jobs/.
type: object
required:
  - entity_id
  - name
  - schedule
  - serdes/meta
properties:
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  name:
    type: string
    description: Job name (e.g., "Daily job", "Hourly job")
  schedule:
    type: string
    description: Cron expression defining the execution schedule (e.g., "0 0 0 * * ? *")
  description:
    type:
      - string
      - "null"
    description: Human-readable description of the job
  built_in_type:
    type:
      - string
      - "null"
    description: >
      Built-in job category. Null for custom jobs.
    enum:
      - null
      - hourly
      - daily
      - weekly
      - monthly
  ui_display_type:
    type:
      - string
      - "null"
    description: >
      How the schedule is displayed in the UI.
    enum:
      - null
      - cron/builder
  job_tags:
    type: array
    description: >
      Transform tags that this job executes. Each entry references
      a TransformTag by entity_id.
    items:
      type: object
      properties:
        tag_id:
          description: TransformTag FK
          $ref: "common/id.yaml#/$defs/entity_id"
        position:
          type: integer
          description: Ordering position
        entity_id:
          description: NanoID of this job-tag association
          $ref: "common/id.yaml#/$defs/entity_id"
        serdes/meta:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              model:
                type: string
                const: TransformJobTransformTag
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches entity_id)
        label:
          type: string
          description: Slugified name
        model:
          type: string
          const: TransformJob
