$schema: https://json-schema.org/draft/2020-12/schema
title: Glossary
description: A glossary term definition.
type: object
required:
  - term
  - serdes/meta
properties:
  term:
    type: string
  serdes/meta:
    type: array
    items:
      type: object
      required: [id, model]
      properties:
        id: { type: string }
        model: { type: string, const: Glossary }
additionalProperties: true
