$schema: https://json-schema.org/draft/2020-12/schema
title: Timeline
description: >
  A timeline of events associated with a collection.
type: object
required:
  - entity_id
  - name
  - serdes/meta
properties:
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  name:
    type: string
    description: Timeline name
  icon:
    type: string
    description: Icon identifier
  collection_id:
    description: Collection FK
    type: [string, "null"]
    if: { type: string }
    then: { $ref: "common/id.yaml#/$defs/entity_id" }
  creator_id:
    $ref: "common/id.yaml#/$defs/user_id"
  events:
    type: array
    description: Timeline events
    items:
      type: object
      properties:
        name:
          type: string
        timestamp:
          type: string
          format: date-time
        icon:
          type: string
        time_matters:
          type: boolean
        timezone:
          type: string
        creator_id:
          $ref: "common/id.yaml#/$defs/user_id"
      additionalProperties: true
  created_at:
    type: string
    format: date-time
  serdes/meta:
    type: array
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
        label:
          type: string
        model:
          type: string
          const: Timeline
