$schema: https://json-schema.org/draft/2020-12/schema
title: Table
description: >
  A database table definition. Tables belong to databases and contain fields.
  Serialized to databases/{db}/schemas/{schema}/tables/{table}/{table}.yaml.
type: object
required:
  - name
  - db_id
  - serdes/meta
properties:
  name:
    type: string
    description: Table name in the database
  display_name:
    type:
      - string
      - "null"
    description: Human-readable display name
  description:
    type:
      - string
      - "null"
    description: Human-readable description
  db_id:
    type: string
    description: Database FK (database name)
  schema:
    type:
      - string
      - "null"
    description: Database schema name (null for schemaless databases)
  active:
    type: boolean
    description: Whether the table is active
    default: true
  serdes/meta:
    type: array
    description: >
      Identity path for serialization. Contains Database, optional Schema,
      and Table entries.
    items:
      type: object
      required: [id, model]
      properties:
        id:
          type: string
        model:
          type: string
          enum: [Database, Schema, Table]
additionalProperties: true
