$schema: https://json-schema.org/draft/2020-12/schema
title: Channel
description: >
  A notification channel (e.g., email or HTTP webhook).
  Channels are serialized to the top-level channels/ directory.
  The channel name is used as the entity identifier (no entity_id column).
type: object
required:
  - name
  - type
  - serdes/meta
properties:
  name:
    type: string
    description: Channel name (unique, used as entity identifier)
  description:
    type:
      - string
      - "null"
    description: Human-readable description
  type:
    type: string
    description: Channel type
    enum:
      - channel/email
      - channel/http
  details:
    type: object
    description: Channel-specific configuration (encrypted in the database)
    additionalProperties: true
  active:
    type: boolean
    description: Whether the channel is active
    default: true
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches name)
        label:
          type: string
          description: Slugified name
        model:
          type: string
          const: Channel
allOf:
  - if:
      properties:
        type: { const: channel/http }
    then:
      properties:
        details:
          type: object
          required:
            - url
            - auth-method
          properties:
            url:
              type: string
              description: Webhook URL
              format: uri
            auth-method:
              type: string
              description: Authentication method
              enum:
                - none
                - header
                - query-param
                - request-body
            auth-info:
              type: object
              description: Authentication details (keys depend on auth-method)
              additionalProperties: true
            fe-form-type:
              type: string
              description: Frontend form type for auth display
              enum:
                - api-key
                - bearer
                - basic
                - none
            method:
              type: string
              description: HTTP method
              enum:
                - get
                - post
                - put
          additionalProperties: false
  - if:
      properties:
        type: { const: channel/email }
    then:
      properties:
        details:
          type: object
          description: Email channel SMTP configuration
          properties:
            host:
              type: string
              description: SMTP server hostname
            port:
              type: integer
              description: SMTP server port
            security:
              type: string
              description: Connection security
              enum:
                - none
                - ssl
                - tls
                - starttls
            username:
              type: string
              description: SMTP username
            password:
              type: string
              description: SMTP password
            from-address:
              type: string
              description: Sender email address
            from-name:
              type: string
              description: Sender display name
            reply-to:
              type: string
              description: Reply-to email address
          additionalProperties: true
