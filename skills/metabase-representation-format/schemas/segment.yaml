$schema: https://json-schema.org/draft/2020-12/schema
title: Segment
description: >
  A saved filter definition. Segments allow reusable filters that can be
  applied across multiple questions and dashboards. Stored under their table's
  directory: databases/{db}/schemas/{schema}/tables/{table}/segments/.
type: object
required:
  - name
  - entity_id
  - creator_id
  - table_id
  - definition
  - serdes/meta
properties:
  name:
    type: string
    description: Segment name
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  creator_id:
    $ref: "common/id.yaml#/$defs/user_id"
  table_id:
    description: Table FK, must match source-table in definition
    $ref: "common/id.yaml#/$defs/table_id"
  definition:
    description: >
      Filter definition in pMBQL format. Must have a single MBQL stage
      with a physical table source and a filter clause. Segments cannot
      use aggregation, breakout, joins, expressions, or other query clauses.
    allOf:
      - $ref: "common/query.yaml"
      - type: object
        required:
          - "lib/type"
          - database
          - stages
        properties:
          stages:
            type: array
            minItems: 1
            maxItems: 1
            items:
              type: object
              required:
                - "lib/type"
                - source-table
                - filters
              additionalProperties: false
              properties:
                "lib/type":
                  const: mbql.stage/mbql
                source-table:
                  $ref: "common/id.yaml#/$defs/table_id"
                filters:
                  type: array
                  items:
                    $ref: "common/query.yaml#/$defs/expression"
  description:
    type:
      - string
      - "null"
    description: Human-readable description
  archived:
    type: boolean
    description: Whether archived
    default: false
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches entity_id)
        label:
          type: string
          description: Slugified name
        model:
          type: string
          const: Segment
