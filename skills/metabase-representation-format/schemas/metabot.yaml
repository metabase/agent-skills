$schema: https://json-schema.org/draft/2020-12/schema
title: Metabot
description: >
  A Metabot instance configuration. Metabots are AI assistants that can answer
  questions using configured prompts and model cards. Serialized to the
  top-level metabots/ directory.
type: object
required:
  - entity_id
  - name
  - serdes/meta
properties:
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  name:
    type: string
    description: Metabot name
  description:
    type:
      - string
      - "null"
    description: Human-readable description
  collection_id:
    description: Collection FK, null for root collection
    type:
      - string
      - "null"
    if: { type: string }
    then: { $ref: "common/id.yaml#/$defs/entity_id" }
  use_verified_content:
    type: boolean
    description: Whether to restrict prompts to verified content only
    default: false
  prompts:
    type: array
    description: Metabot prompts (inlined MetabotPrompt entities)
    default: []
    items:
      type: object
      required:
        - entity_id
        - prompt
        - model
        - card_id
      properties:
        entity_id:
          $ref: "common/id.yaml#/$defs/entity_id"
        prompt:
          type: string
          description: The prompt text
        model:
          type: string
          description: The type of card this prompt targets
          enum:
            - model
            - question
            - metric
        card_id:
          description: Card FK (entity_id of the referenced card)
          $ref: "common/id.yaml#/$defs/entity_id"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        serdes/meta:
          type: array
          description: Identity path including parent Metabot
          items:
            type: object
            required: [id, model]
            properties:
              id: { type: string }
              model:
                type: string
                enum: [Metabot, MetabotPrompt]
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  updated_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches entity_id)
        label:
          type: string
          description: Slugified name
        model:
          type: string
          const: Metabot
