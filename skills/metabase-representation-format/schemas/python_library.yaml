$schema: https://json-schema.org/draft/2020-12/schema
title: PythonLibrary
description: >
  A shared Python source file available to transforms.
  Stored in the python_libraries/ directory.
type: object
required:
  - entity_id
  - path
  - source
  - serdes/meta
properties:
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  path:
    type: string
    description: Python file path (e.g., "common.py")
  source:
    type: string
    description: Python source code
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches entity_id)
        model:
          type: string
          const: PythonLibrary
