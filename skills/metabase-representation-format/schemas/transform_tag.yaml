$schema: https://json-schema.org/draft/2020-12/schema
title: TransformTag
description: >
  A tag that categorizes transforms for scheduling and organization.
  Stored in transforms/transform_tags/. Tags can be built-in (hourly,
  daily, weekly, monthly) or custom.
type: object
required:
  - entity_id
  - name
  - serdes/meta
properties:
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  name:
    type: string
    description: Tag name (e.g., "hourly", "daily", "custom-etl")
  built_in_type:
    type:
      - string
      - "null"
    description: >
      Built-in tag category. Null for custom tags.
    enum:
      - null
      - hourly
      - daily
      - weekly
      - monthly
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches entity_id)
        label:
          type: string
          description: Slugified name
        model:
          type: string
          const: TransformTag
