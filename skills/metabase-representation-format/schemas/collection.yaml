$schema: https://json-schema.org/draft/2020-12/schema
title: Collection
description: >
  A folder-like container for organizing cards, dashboards, and other entities.
  Collection hierarchy is reflected in the directory structure.
type: object
required:
  - name
  - entity_id
  - serdes/meta
properties:
  name:
    type: string
    description: Collection name
  entity_id:
    $ref: "common/id.yaml#/$defs/entity_id"
  description:
    type:
      - string
      - "null"
    description: Human-readable description
  slug:
    type: string
    description: URL-friendly name
  archived:
    type: boolean
    description: Whether archived
    default: false
  archived_directly:
    type:
      - boolean
      - "null"
    description: Archived directly vs. inherited from parent
  type:
    type:
      - string
      - "null"
    description: Collection type
    enum:
      - null
      - instance-analytics
      - library
      - library-data
      - library-metrics
      - trash
      - tenant-specific-root-collection
  namespace:
    type:
      - string
      - "null"
    description: Collection namespace
    enum:
      - null
      - transforms
      - snippets
      - shared-tenant-collection
      - tenant-specific
  authority_level:
    type:
      - string
      - "null"
    description: Authority level
    enum:
      - null
      - official
  archive_operation_id:
    type:
      - string
      - "null"
    description: Archive operation identifier
  is_remote_synced:
    type: boolean
    description: Remote sync flag
    default: false
  is_sample:
    type: boolean
    description: Sample collection flag
    default: false
  parent_id:
    description: >
      Collection FK — parent collection, or null for root-level collections.
    type: [string, "null"]
    if: { type: string }
    then: { $ref: "common/id.yaml#/$defs/entity_id" }
  personal_owner_id:
    description: User FK for personal collections
    type: [string, "null"]
    if: { type: string }
    then: { $ref: "common/id.yaml#/$defs/user_id" }
  created_at:
    type: string
    description: ISO 8601 timestamp
    format: date-time
  serdes/meta:
    type: array
    description: Identity path for serialization
    items:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          description: Entity identifier (matches entity_id)
        label:
          type: string
          description: Slugified name
        model:
          type: string
          const: Collection
